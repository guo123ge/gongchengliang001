[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Netlify 官方 Next.js Runtime v5 已内置，无需手动声明 plugin。
# 它会自动把 App Router、API Routes (/api/ai/chat) 转换为 Netlify Functions / Edge Functions。

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
